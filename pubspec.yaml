name: kefir_control
description: A simple Flutter mobile application to track milk kefir fermentation time.
publish_to: 'none'

version: 2.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.1.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  url_launcher: ^6.3.1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  uuid: ^4.5.3
  file_picker: ^10.3.10
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/splash_icon.png"
  android_12:
    image: "assets/icon/splash_icon.png"
    icon_background_color: "#FFFFFF"
